name: Update data and deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    # US fast checks, FRED/rates only: 07:30, 09:00, 12:00 JST Tue-Sat.
    - cron: "30 22 * * 1-5"
    - cron: "0 0 * * 2-6"
    - cron: "0 3 * * 2-6"
    # US market checks, Yahoo/Cboe/breadth: 09:30, 10:30, 14:30 JST Tue-Sat.
    - cron: "30 0 * * 2-6"
    - cron: "30 1 * * 2-6"
    - cron: "30 5 * * 2-6"
    # US slow checks, weekly/monthly/quarterly only once: 14:00 JST Tue-Sat.
    - cron: "0 5 * * 2-6"
    # Japan/Taiwan daily checks after local markets and official updates: 19:30, 21:30 JST.
    - cron: "30 10 * * 1-5"
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      update_profile:
        description: Data group to refresh
        required: true
        default: full
        type: choice
        options:
          - full
          - us
          - us-fast
          - us-market
          - us-slow
          - asia

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Mark refresh start time
        run: echo "DASHBOARD_REFRESH_STARTED_AT=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S+09:00')" >> "${GITHUB_ENV}"

      - name: Select scheduled data group
        if: github.event_name != 'push'
        run: |
          profile="${{ inputs.update_profile || 'full' }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "30 22 * * 1-5") profile=us-fast ;;
              "0 0 * * 2-6") profile=us-fast ;;
              "0 3 * * 2-6") profile=us-fast ;;
              "30 0 * * 2-6") profile=us-market ;;
              "30 1 * * 2-6") profile=us-market ;;
              "30 5 * * 2-6") profile=us-market ;;
              "0 5 * * 2-6") profile=us-slow ;;
              "30 10 * * 1-5") profile=asia ;;
              "30 12 * * 1-5") profile=asia ;;
              *) profile=full ;;
            esac
          fi

          echo "UPDATE_PROFILE=${profile}" >> "${GITHUB_ENV}"
          echo "Selected ${profile} update group."

      - name: Update CSV data
        if: github.event_name != 'push'
        run: |
          set +e
          failures=0
          attempted=0
          printf '{}\n' > .update-results.json

          record_update_result() {
            node - "${1}" "${2}" "${3}" <<'NODE'
          const fs = require("fs");
          const keys = process.argv[2].split(",");
          const status = process.argv[3];
          const errorMessage = process.argv[4] || null;
          const file = ".update-results.json";
          const data = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, "utf8")) : {};
          const now = new Intl.DateTimeFormat("en-CA", {
            timeZone: "Asia/Tokyo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false,
          })
            .formatToParts(new Date())
            .reduce((acc, part) => ({ ...acc, [part.type]: part.value }), {});
          const timestamp = `${now.year}-${now.month}-${now.day}T${now.hour}:${now.minute}:${now.second}+09:00`;

          for (const key of keys) {
            data[key] = {
              status,
              last_successful_refresh: status === "success" ? timestamp : null,
              error_message: status === "failed" ? errorMessage : null,
            };
          }

          fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          NODE
          }

          run_update() {
            name="$1"
            command="$2"
            keys="$3"
            mode="$4"
            profile="$5"

            if [ "${mode}" != "force" ]; then
              node scripts/should-update.mjs "${profile}" "${mode}" "${keys}"
              gate_code=$?
              if [ "${gate_code}" -eq 3 ]; then
                echo "::notice::${name} already complete for this cycle; skipped."
                return
              fi
              if [ "${gate_code}" -ne 0 ]; then
                echo "::warning::Could not evaluate ${name} freshness; running it as a precaution."
              fi
            fi

            attempted=1
            echo "::group::$1"
            output="$(bash -lc "${command}" 2>&1)"
            exit_code=$?
            echo "${output}"
            if [ "${exit_code}" -ne 0 ]; then
              echo "::warning::${name} failed; keeping existing committed data where available."
              record_update_result "${keys}" "failed" "${output}"
              failures=1
            else
              record_update_result "${keys}" "success" ""
            fi
            echo "::endgroup::"
          }

          run_us_fast() {
            run_update "S&P 500" "node scripts/update-sp500.mjs" "SP500" "daily" "us"
            run_update "HY OAS" "node scripts/update-hy-oas.mjs" "BAMLH0A0HYM2" "daily" "us"
            run_update "VIX" "node scripts/update-fred-series.mjs --series=VIXCLS" "VIXCLS" "daily" "us"
            run_update "US 10Y-2Y spread" "node scripts/update-fred-series.mjs --series=T10Y2Y" "T10Y2Y" "daily" "us"
            run_update "US 10Y yield" "node scripts/update-fred-series.mjs --series=DGS10" "DGS10" "daily" "us"
            run_update "US 2Y and US-JP spread" "node scripts/update-fx.mjs --profile=us --only=us2y" "DGS2,US_JAPAN_2Y_SPREAD" "daily" "us"
            run_update "US 10Y term premium" "node scripts/update-us-rates.mjs" "ACMTP10" "daily" "us"
          }

          run_us_market() {
            run_update "MOVE Index" "node scripts/update-extra-indicators.mjs --only=move" "MOVE" "daily" "us"
            run_update "CBOE SKEW Index" "node scripts/update-extra-indicators.mjs --only=skew" "SKEW" "daily" "us"
            run_update "SOX Index" "node scripts/update-extra-indicators.mjs --only=sox" "SOX" "daily" "us"
            run_update "US breadth indicators" "node scripts/update-extra-indicators.mjs --only=breadth" "ADVANCE_DECLINE_LINE,SP500_ABOVE_200DMA" "daily" "us"
            run_update "USD/JPY" "node scripts/update-fx.mjs --profile=us --only=usdjpy" "DEXJPUS" "daily" "us"
          }

          run_us_slow() {
            run_update "Fed balance sheet" "node scripts/update-fred-series.mjs --series=WALCL" "WALCL" "once" "us"
            run_update "NFCI" "node scripts/update-fred-series.mjs --series=NFCI" "NFCI" "once" "us"
            run_update "AI CapEx" "node scripts/update-extra-indicators.mjs --only=ai-capex" "AI_CAPEX" "once" "us"
            run_update "FINRA Margin Debt YoY" "python scripts/update-finra-margin-debt-yoy.py" "FINRA_MARGIN_DEBT_YOY" "once" "us"
          }

          run_asia_daily() {
            run_update "Japan 2Y and spread" "node scripts/update-fx.mjs --profile=asia --only=japan2y" "JAPAN_2Y_JGB,US_JAPAN_2Y_SPREAD" "daily" "asia"
            run_update "Japan 10Y rates" "node scripts/update-japan-rates.mjs" "JAPAN_10Y_JGB,JAPAN_10Y_2Y_SPREAD" "daily" "asia"
            run_update "Nikkei 225" "node scripts/update-regional-markets.mjs --only=nikkei" "NIKKEI_225" "daily" "asia"
            run_update "TOPIX" "python scripts/update-regional-official.py --only=topix" "TOPIX" "daily" "asia"
            run_update "Taiwan foreign net buying" "python scripts/update-regional-official.py --only=taiwan-foreign" "TAIWAN_FOREIGN_NET_BUYING" "daily" "asia"
            run_update "Taiwan margin financing YoY" "python scripts/update-regional-official.py --only=taiwan-margin" "TAIWAN_MARGIN_FINANCING_BALANCE_YOY" "daily" "asia"
            run_update "TAIEX" "node scripts/update-regional-markets.mjs --only=taiex" "TAIEX" "daily" "asia"
            run_update "USD/TWD" "node scripts/update-regional-markets.mjs --only=usdtwd" "USDTWD" "daily" "asia"
            run_update "TSMC Revenue YoY" "node scripts/update-extra-indicators.mjs --only=tsmc" "TSMC_REVENUE_YOY" "once" "asia"
            run_update "Japan foreign net buying" "python scripts/update-regional-official.py --only=japan-foreign" "JAPAN_FOREIGN_NET_BUYING" "once" "asia"
            run_update "Taiwan electronics exports YoY" "python scripts/update-regional-official.py --only=taiwan-exports" "TAIWAN_ELECTRONICS_EXPORTS_YOY" "once" "asia"
          }

          if [ "${UPDATE_PROFILE}" = "us-fast" ]; then
            run_us_fast
          elif [ "${UPDATE_PROFILE}" = "us-market" ]; then
            run_us_market
          elif [ "${UPDATE_PROFILE}" = "us-slow" ]; then
            run_us_slow
          elif [ "${UPDATE_PROFILE}" = "us" ]; then
            run_us_fast
            run_us_market
            run_us_slow
          elif [ "${UPDATE_PROFILE}" = "asia" ]; then
            run_asia_daily
          else
            run_update "S&P 500" "node scripts/update-sp500.mjs" "SP500" "force" "full"
            run_update "HY OAS" "node scripts/update-hy-oas.mjs" "BAMLH0A0HYM2" "force" "full"
            run_update "FRED macro series" "node scripts/update-fred-series.mjs" "VIXCLS,T10Y2Y,DGS10,WALCL,NFCI" "force" "full"
            run_update "Extra market indicators" "node scripts/update-extra-indicators.mjs" "MOVE,SKEW,SOX,TSMC_REVENUE_YOY,AI_CAPEX,ADVANCE_DECLINE_LINE,SP500_ABOVE_200DMA" "force" "full"
            run_update "FX series" "node scripts/update-fx.mjs --profile=full" "DEXJPUS,DGS2,JAPAN_2Y_JGB,US_JAPAN_2Y_SPREAD" "force" "full"
            run_update "US rates" "node scripts/update-us-rates.mjs" "ACMTP10" "force" "full"
            run_update "Japan rates" "node scripts/update-japan-rates.mjs" "JAPAN_10Y_JGB,JAPAN_10Y_2Y_SPREAD" "force" "full"
            run_update "Regional markets" "node scripts/update-regional-markets.mjs" "NIKKEI_225,TAIEX,USDTWD" "force" "full"
            run_update "Regional official indicators" "python scripts/update-regional-official.py" "TOPIX,JAPAN_FOREIGN_NET_BUYING,TAIWAN_FOREIGN_NET_BUYING,TAIWAN_ELECTRONICS_EXPORTS_YOY,TAIWAN_MARGIN_FINANCING_BALANCE_YOY" "force" "full"
            run_update "FINRA Margin Debt YoY" "python scripts/update-finra-margin-debt-yoy.py" "FINRA_MARGIN_DEBT_YOY" "force" "full"
          fi

          echo "DATA_UPDATE_FAILURES=${failures}" >> "${GITHUB_ENV}"
          echo "ANY_UPDATE_ATTEMPTED=${attempted}" >> "${GITHUB_ENV}"

      - name: Generate data status metadata
        if: github.event_name == 'push' || env.ANY_UPDATE_ATTEMPTED == '1'
        run: node scripts/generate-status.mjs

      - name: Validate scripts
        run: |
          node --check app.js
          node --check sw.js
          node --check scripts/generate-status.mjs
          node --check scripts/update-sp500.mjs
          node --check scripts/update-hy-oas.mjs
          node --check scripts/update-fred-series.mjs
          node --check scripts/update-extra-indicators.mjs
          node --check scripts/update-fx.mjs
          node --check scripts/update-us-rates.mjs
          node --check scripts/update-japan-rates.mjs
          node --check scripts/update-regional-markets.mjs
          node --check scripts/should-update.mjs
          python -B -m py_compile scripts/update-regional-official.py
          python -B -m py_compile scripts/update-finra-margin-debt-yoy.py

      - name: Remove generated caches
        run: |
          find . -name "__pycache__" -type d -prune -exec rm -rf {} +
          find . -name "*.pyc" -delete

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update dashboard data [skip ci]"
          git push

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html style.css app.js manifest.json sw.js offline.html _site/
          cp -R icons _site/icons
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
