name: Update data and deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    # US daily checks: 07:20, 08:50, 10:20, 11:50, 13:50 JST Tue-Sat.
    - cron: "20 22 * * 1-5"
    - cron: "50 23 * * 1-5"
    - cron: "20 1 * * 2-6"
    - cron: "50 2 * * 2-6"
    - cron: "50 4 * * 2-6"
    # Japan/Taiwan daily checks after local markets and official updates: 19:20, 21:20 JST.
    - cron: "20 10 * * 1-5"
    - cron: "20 12 * * 1-5"
  workflow_dispatch:
    inputs:
      update_profile:
        description: Data group to refresh
        required: true
        default: full
        type: choice
        options:
          - full
          - us
          - us-fast
          - us-market
          - us-slow
          - asia

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Mark refresh start time
        run: echo "DASHBOARD_REFRESH_STARTED_AT=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S+09:00')" >> "${GITHUB_ENV}"

      - name: Select scheduled data group
        if: github.event_name != 'push'
        run: |
          profile="${{ inputs.update_profile || 'full' }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "20 22 * * 1-5") profile=us ;;
              "50 23 * * 1-5") profile=us ;;
              "20 1 * * 2-6") profile=us ;;
              "50 2 * * 2-6") profile=us ;;
              "50 4 * * 2-6") profile=us-with-slow ;;
              "20 10 * * 1-5") profile=asia ;;
              "20 12 * * 1-5") profile=asia-retry ;;
              *) profile=full ;;
            esac
          fi

          echo "UPDATE_PROFILE=${profile}" >> "${GITHUB_ENV}"
          echo "Selected ${profile} update group."

      - name: Update CSV data
        if: github.event_name != 'push'
        run: |
          set +e
          failures=0
          attempted=0
          command_timeout_seconds=180
          source_circuit_dir="${RUNNER_TEMP:-/tmp}/market-dashboard-source-circuits-${GITHUB_RUN_ID:-$$}"
          mkdir -p "${source_circuit_dir}"
          printf '{}\n' > .update-results.json

          source_state_prefix() {
            source_key="${1//[^a-zA-Z0-9_.-]/_}"
            printf '%s/%s' "${source_circuit_dir}" "${source_key}"
          }

          record_update_result() {
            node - "${1}" "${2}" "${3}" <<'NODE'
          const fs = require("fs");
          const keys = process.argv[2].split(",");
          const status = process.argv[3];
          const errorMessage = process.argv[4] || null;
          const file = ".update-results.json";
          const data = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, "utf8")) : {};
          const now = new Intl.DateTimeFormat("en-CA", {
            timeZone: "Asia/Tokyo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false,
          })
            .formatToParts(new Date())
            .reduce((acc, part) => ({ ...acc, [part.type]: part.value }), {});
          const timestamp = `${now.year}-${now.month}-${now.day}T${now.hour}:${now.minute}:${now.second}+09:00`;

          for (const key of keys) {
            data[key] = {
              status,
              last_successful_refresh: status === "success" ? timestamp : null,
              error_message: status === "failed" ? errorMessage : null,
            };
          }

          fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          NODE
          }

          run_update() {
            name="$1"
            command="$2"
            keys="$3"
            mode="$4"
            profile="$5"
            source_group="${6:-}"

            if [ "${mode}" != "force" ]; then
              node scripts/should-update.mjs "${profile}" "${mode}" "${keys}"
              gate_code=$?
              if [ "${gate_code}" -eq 3 ]; then
                echo "::notice::${name} already complete for this cycle; skipped."
                return
              fi
              if [ "${gate_code}" -ne 0 ]; then
                echo "::warning::Could not evaluate ${name} freshness; running it as a precaution."
              fi
            fi

            state_prefix=""
            if [ -n "${source_group}" ]; then
              state_prefix="$(source_state_prefix "${source_group}")"
            fi

            if [ -n "${state_prefix}" ] && [ -f "${state_prefix}.open" ]; then
              attempted=1
              output="${source_group} circuit breaker is open after two consecutive connection failures; deferred to the next scheduled run."
              echo "::warning::${name} skipped. ${output}"
              record_update_result "${keys}" "failed" "${output}"
              failures=1
              return
            fi

            attempted=1
            echo "::group::$1"
            timeout_seconds="${command_timeout_seconds}"
            if [ "${mode}" = "force" ]; then
              timeout_seconds=900
            fi
            output="$(timeout --signal=TERM --kill-after=10s "${timeout_seconds}s" bash -lc "${command}" 2>&1)"
            exit_code=$?
            echo "${output}"
            if [ "${exit_code}" -ne 0 ]; then
              if [ "${exit_code}" -eq 124 ]; then
                output="Command exceeded ${timeout_seconds} seconds and was stopped. ${output}"
              fi

              if [ -n "${state_prefix}" ] && {
                [ "${exit_code}" -eq 124 ] ||
                printf '%s' "${output}" | grep -Eiq 'timed out|timeout|ECONNRESET|ENOTFOUND|EAI_AGAIN|socket hang up|connection reset|connection refused|temporary failure|HTTP (307|429|5[0-9][0-9])|HTTP Error (307|429|5[0-9][0-9])|\((307|429|5[0-9][0-9])\)|fetch failed|TLS|network';
              }; then
                failure_count=0
                if [ -f "${state_prefix}.count" ]; then
                  read -r failure_count < "${state_prefix}.count"
                fi
                failure_count=$((failure_count + 1))
                printf '%s\n' "${failure_count}" > "${state_prefix}.count"
                if [ "${failure_count}" -ge 2 ]; then
                  touch "${state_prefix}.open"
                  echo "::warning::${source_group} circuit breaker opened for the rest of this workflow."
                fi
              fi

              echo "::warning::${name} failed; keeping existing committed data and deferring another attempt to the next schedule."
              record_update_result "${keys}" "failed" "${output}"
              failures=1
            else
              if [ -n "${state_prefix}" ]; then
                rm -f "${state_prefix}.count" "${state_prefix}.open"
              fi
              record_update_result "${keys}" "success" ""
            fi
            echo "::endgroup::"
          }

          run_us_fast() {
            run_update "S&P 500" "node scripts/update-sp500.mjs" "SP500" "daily" "us" "fred"
            run_update "HY OAS" "node scripts/update-hy-oas.mjs" "BAMLH0A0HYM2" "daily" "us" "fred"
            run_update "VIX" "node scripts/update-fred-series.mjs --series=VIXCLS" "VIXCLS" "daily" "us" "fred"
            run_update "US 10Y-2Y spread" "node scripts/update-fred-series.mjs --series=T10Y2Y" "T10Y2Y" "daily" "us" "fred"
            run_update "US 10Y yield" "node scripts/update-fred-series.mjs --series=DGS10" "DGS10" "daily" "us" "fred"
            run_update "US 2Y and US-JP spread" "node scripts/update-fx.mjs --profile=us --only=us2y" "DGS2,US_JAPAN_2Y_SPREAD" "daily" "us" "fred"
            run_update "US 10Y term premium" "node scripts/update-us-rates.mjs" "ACMTP10" "daily" "us" "new-york-fed"
          }

          run_us_market() {
            run_update "MOVE Index" "node scripts/update-extra-indicators.mjs --only=move" "MOVE" "daily" "us" "yahoo"
            run_update "HYG/IEF" "node scripts/update-extra-indicators.mjs --only=hyg-ief" "HYG_IEF" "daily" "us" "yahoo"
            run_update "CBOE SKEW Index" "node scripts/update-extra-indicators.mjs --only=skew" "SKEW" "daily" "us" "cboe"
            run_update "SOX Index" "node scripts/update-extra-indicators.mjs --only=sox" "SOX" "daily" "us" "yahoo"
            run_update "US breadth indicators" "node scripts/update-extra-indicators.mjs --only=breadth" "ADVANCE_DECLINE_LINE,SP500_ABOVE_200DMA" "daily" "us" "yahoo"
            run_update "USD/JPY" "node scripts/update-fx.mjs --profile=us --only=usdjpy" "DEXJPUS" "daily" "us" "fx-market"
          }

          run_us_slow() {
            slow_mode="${1:-once}"
            run_update "Fed Funds Rate" "node scripts/update-fred-series.mjs --series=DFEDTARU" "DFEDTARU" "${slow_mode}" "us" "fred"
            run_update "Fed balance sheet" "node scripts/update-fred-series.mjs --series=WALCL" "WALCL" "${slow_mode}" "us" "fred"
            run_update "NFCI" "node scripts/update-fred-series.mjs --series=NFCI" "NFCI" "${slow_mode}" "us" "fred"
            run_update "ISM Manufacturing PMI" "node scripts/update-extra-indicators.mjs --only=ism-pmi" "ISM_MANUFACTURING_PMI" "${slow_mode}" "us" "ism"
            run_update "AI CapEx" "node scripts/update-extra-indicators.mjs --only=ai-capex" "AI_CAPEX" "${slow_mode}" "us" "sec"
            run_update "FINRA Margin Debt YoY" "python scripts/update-finra-margin-debt-yoy.py" "FINRA_MARGIN_DEBT_YOY" "${slow_mode}" "us" "finra"
          }

          run_asia_daily() {
            run_update "Japan 2Y and spread" "node scripts/update-fx.mjs --profile=asia --only=japan2y" "JAPAN_2Y_JGB,US_JAPAN_2Y_SPREAD" "daily" "asia" "japan-mof"
            run_update "Japan 10Y rates" "node scripts/update-japan-rates.mjs" "JAPAN_10Y_JGB,JAPAN_10Y_2Y_SPREAD" "daily" "asia" "japan-mof"
            run_update "Nikkei 225" "node scripts/update-regional-markets.mjs --only=nikkei" "NIKKEI_225" "daily" "asia" "yahoo"
            run_update "TOPIX" "python scripts/update-regional-official.py --only=topix" "TOPIX" "daily" "asia" "jpx"
            run_update "Taiwan foreign net buying" "python scripts/update-regional-official.py --only=taiwan-foreign" "TAIWAN_FOREIGN_NET_BUYING" "daily" "asia" "twse"
            run_update "Taiwan margin financing YoY" "python scripts/update-regional-official.py --only=taiwan-margin" "TAIWAN_MARGIN_FINANCING_BALANCE_YOY" "daily" "asia" "twse"
            run_update "TAIEX" "node scripts/update-regional-markets.mjs --only=taiex" "TAIEX" "daily" "asia" "yahoo"
            run_update "USD/TWD" "node scripts/update-regional-markets.mjs --only=usdtwd" "USDTWD" "daily" "asia" "fx-market"
          }

          run_asia_slow() {
            slow_mode="${1:-once}"
            run_update "TSMC Revenue YoY" "node scripts/update-extra-indicators.mjs --only=tsmc" "TSMC_REVENUE_YOY" "${slow_mode}" "asia" "mops"
            run_update "Japan foreign net buying" "python scripts/update-regional-official.py --only=japan-foreign" "JAPAN_FOREIGN_NET_BUYING" "${slow_mode}" "asia" "jpx"
            run_update "Taiwan electronics exports YoY" "python scripts/update-regional-official.py --only=taiwan-exports" "TAIWAN_ELECTRONICS_EXPORTS_YOY" "${slow_mode}" "asia" "taiwan-mof"
          }

          if [ "${UPDATE_PROFILE}" = "us-fast" ]; then
            run_us_fast
          elif [ "${UPDATE_PROFILE}" = "us-market" ]; then
            run_us_market
          elif [ "${UPDATE_PROFILE}" = "us-slow" ]; then
            run_us_slow slow-baseline
          elif [ "${UPDATE_PROFILE}" = "us" ]; then
            run_us_fast
            run_us_market
            run_us_slow slow-overdue
          elif [ "${UPDATE_PROFILE}" = "us-with-slow" ]; then
            run_us_fast
            run_us_market
            run_us_slow slow-baseline
          elif [ "${UPDATE_PROFILE}" = "asia" ]; then
            run_asia_daily
            run_asia_slow slow-baseline
          elif [ "${UPDATE_PROFILE}" = "asia-retry" ]; then
            run_asia_daily
            run_asia_slow slow-overdue
          else
            run_update "S&P 500" "node scripts/update-sp500.mjs" "SP500" "force" "full"
            run_update "HY OAS" "node scripts/update-hy-oas.mjs" "BAMLH0A0HYM2" "force" "full"
            run_update "FRED macro series" "node scripts/update-fred-series.mjs" "VIXCLS,T10Y2Y,DGS10,WALCL,NFCI,DFEDTARU" "force" "full"
            run_update "Extra market indicators" "node scripts/update-extra-indicators.mjs" "MOVE,HYG_IEF,SKEW,SOX,TSMC_REVENUE_YOY,AI_CAPEX,ISM_MANUFACTURING_PMI,ADVANCE_DECLINE_LINE,SP500_ABOVE_200DMA" "force" "full"
            run_update "FX series" "node scripts/update-fx.mjs --profile=full" "DEXJPUS,DGS2,JAPAN_2Y_JGB,US_JAPAN_2Y_SPREAD" "force" "full"
            run_update "US rates" "node scripts/update-us-rates.mjs" "ACMTP10" "force" "full"
            run_update "Japan rates" "node scripts/update-japan-rates.mjs" "JAPAN_10Y_JGB,JAPAN_10Y_2Y_SPREAD" "force" "full"
            run_update "Regional markets" "node scripts/update-regional-markets.mjs" "NIKKEI_225,TAIEX,USDTWD" "force" "full"
            run_update "Regional official indicators" "python scripts/update-regional-official.py" "TOPIX,JAPAN_FOREIGN_NET_BUYING,TAIWAN_FOREIGN_NET_BUYING,TAIWAN_ELECTRONICS_EXPORTS_YOY,TAIWAN_MARGIN_FINANCING_BALANCE_YOY" "force" "full"
            run_update "FINRA Margin Debt YoY" "python scripts/update-finra-margin-debt-yoy.py" "FINRA_MARGIN_DEBT_YOY" "force" "full"
          fi

          echo "DATA_UPDATE_FAILURES=${failures}" >> "${GITHUB_ENV}"
          echo "ANY_UPDATE_ATTEMPTED=${attempted}" >> "${GITHUB_ENV}"

      - name: Generate data status metadata
        if: github.event_name == 'push' || env.ANY_UPDATE_ATTEMPTED == '1'
        run: node scripts/generate-status.mjs

      - name: Generate consolidated data
        run: node scripts/generate-consolidated.mjs

      - name: Validate scripts
        run: |
          node --check app.js
          node --check sw.js
          node --check scripts/generate-consolidated.mjs
          node --check scripts/generate-status.mjs
          node --check scripts/update-sp500.mjs
          node --check scripts/update-hy-oas.mjs
          node --check scripts/update-fred-series.mjs
          node --check scripts/update-extra-indicators.mjs
          node --check scripts/update-fx.mjs
          node --check scripts/update-us-rates.mjs
          node --check scripts/update-japan-rates.mjs
          node --check scripts/update-regional-markets.mjs
          node --check scripts/should-update.mjs
          node --check scheduler/worker.mjs
          node -e 'JSON.parse(require("fs").readFileSync("scheduler/wrangler.jsonc", "utf8"))'
          python -B -m py_compile scripts/update-regional-official.py
          python -B -m py_compile scripts/update-finra-margin-debt-yoy.py

      - name: Remove generated caches
        run: |
          find . -name "__pycache__" -type d -prune -exec rm -rf {} +
          find . -name "*.pyc" -delete

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update dashboard data [skip ci]"
          git push

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html style.css app.js manifest.json sw.js offline.html _site/
          cp -R icons _site/icons
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
