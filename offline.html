<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Market Indicators Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --surface: #ffffff;
        --ink: #111827;
        --muted: #64748b;
        --blue: #2563eb;
        --line: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        padding:
          calc(24px + env(safe-area-inset-top))
          calc(20px + env(safe-area-inset-right))
          calc(24px + env(safe-area-inset-bottom))
          calc(20px + env(safe-area-inset-left));
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(460px, 100%);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 24px;
        background: var(--surface);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-weight: 700;
        line-height: 1.5;
      }

      h1 {
        margin: 0;
        color: var(--blue);
        font-size: clamp(1.8rem, 8vw, 2.4rem);
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>The dashboard shell is available, but fresh market data needs a network connection. Reconnect and reopen the app to refresh the CSV data.</p>
    </main>
  </body>
</html>
